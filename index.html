    <style>
      html {
        scroll-behavior: smooth;
        height: 100%;
        overflow-x: hidden;
      }
      body {
        font-family: 'Inter', sans-serif;
        color: #3a3a3a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        width: 100%;
        min-height: 100%;
        position: relative;
        font-size: 14px; /* Default for mobile text */
        line-height: 1.6;
        background-color: #fff;
      }
      @media (min-width: 768px) {
        body {
          font-size: 16px;
        }
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        letter-spacing: -0.01em;
      }
      /* Ensure scroll works on iOS */
      #root {
        overflow-x: hidden;
      }
      
      /* Main content wrapper is full width to allow backgrounds to bleed */
      main {
        width: 100%;
      }

      /* Use .container to constrain content to 1440px and center it */
      .container {
        padding-left: 14px !important;
        padding-right: 14px !important;
        max-width: 1440px !important; 
        margin-left: auto !important;
        margin-right: auto !important;
        width: 100%;
      }
      @media (min-width: 768px) {
        .container {
          padding-left: 2rem !important;
          padding-right: 2rem !important;
        }
      }
      /* Utility for mobile card radius as requested */
      .card-radius {
        border-radius: 12px !important;
      }
      @media (min-width: 768px) {
        .card-radius {
          border-radius: 24px !important;
        }
      }
      /* Speed up animations globally */
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
